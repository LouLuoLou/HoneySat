dataLinks:
  - name: udp_tc_frame_downlink
    class: org.yamcs.tctm.ccsds.UdpTcFrameLink
    host: ${env.PROXY_HOST:localhost}
    port: 10018
    spacecraftId: 0xAB
    maxFrameLength: 1024
    priorityScheme: FIFO
    virtualChannels:
        - vcId: 0 # BUS REALTIME TC/TM
          service: "PACKET"
          priority: 1
          commandPostprocessorClassName: org.yamcs.tctm.pus.PusCommandPostprocessor
          commandPostprocessorArgs:
              errorDetection:
                 type: CRC-16-CCIIT
          stream: "tc_bus_realtime"

        # - vcId: 1 # CFDP
        #   service: "PACKET"
        #   priority: 1
        #   stream: "cfdp_udp_tx"

  - name: udp_tm_frame_uplink
    class: org.yamcs.tctm.ccsds.UdpTmFrameLink
    port: 10017
    rawFrameDecoder:
        codec: NONE
    frameType: "USLP"
    spacecraftId: 0xAB
    frameLength: 522
    frameHeaderErrorControlPresent: false
    insertZoneLength: 0
    errorDetection: NONE
    clcwStream: clcw
    goodFrameStream: good_frames
    badFrameStream: bad_frames
    virtualChannels:
      - vcId: 0 # BUS REALTIME TC/TM
        ocfPresent: true
        service: "PACKET"
        maxPacketLength: 2048
        stream: "tm_bus_realtime"
        packetPreprocessorClassName: org.yamcs.tctm.pus.PusPacketPreprocessor
        packetPreprocessorArgs:
            errorDetection:
               type: CRC-16-CCIIT
            timeEncoding:
               type: CUC
               epoch: NONE
            tcoService: tco0

      # - vcId: 1 # CFDP
      #   ocfPresent: true
      #   service: "PACKET"
      #   maxPacketLength: 2048
      #   stream: "cfdp_udp_tm"
      #   packetPreprocessorClassName: com.example.myproject.MyPacketPreprocessor
        
