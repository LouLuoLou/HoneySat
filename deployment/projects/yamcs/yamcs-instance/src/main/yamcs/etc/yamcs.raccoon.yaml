mdb:
  # Configuration of the active loaders
  # Valid loaders are: sheet, xtce or fully qualified name of the class
  - type: "xtce"
    spec: "mdb/dt.xml"

  - type: "xtce"
    spec: "mdb/xtce-pus-frame-attempt2.xml"
 
  - type: "xtce"
    spec: "mdb/raccoon.xml"
    
  - type: "xtce"
    spec: "mdb/raccoon-generated.xml"

  - type: "xtce"
    spec: "mdb/pus11.xml"

  - type: "xtce"
    spec: "mdb/parameters-dt-v2.xml"

  - type: "xtce"
    spec: "mdb/thermal-test.xml"

  #- type: "xtce"
  #  spec: "mdb/raccoon-parameters.xml"

#Configuration for streams created at server startup
streamConfig:
  tm:
    - name: "tm_realtime"
      processor: "realtime"
  invalidTm: "invalid_tm_stream"
  cmdHist: ["cmdhist_realtime", "cmdhist_dump"]
  event: ["events_realtime", "events_dump"]
  param: ["pp_realtime", "sys_param", "proc_param"]
  parameterAlarm: ["alarms_realtime"]
  eventAlarm: ["event_alarms_realtime"]
  tc: 
    - name: "tc_realtime"
      processor: "realtime"

    - name: "cfdp_udp_tx"


  sqlFile: "etc/cfdp_streams.sql"

